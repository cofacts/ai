name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize]

jobs:
  test-adk:
    name: Test adk (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adk
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest -v

  lint-adk:
    name: Lint adk (ruff, ty)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adk
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting (ruff format)
        run: uv run ruff format --check .

      # !cancelled(): run every check even when an earlier one fails,
      # so a single CI run reports all format/lint/type errors at once.
      - name: Lint (ruff check)
        if: ${{ !cancelled() }}
        run: uv run ruff check .

      - name: Typecheck (ty)
        if: ${{ !cancelled() }}
        run: uv run ty check .

  lint-frontend:
    name: Lint frontend (ESLint, Prettier, tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint

      # !cancelled(): run every check even when an earlier one fails,
      # so a single CI run reports all format/lint/type errors at once.
      - name: Format check (Prettier)
        if: ${{ !cancelled() }}
        run: pnpm exec prettier --check .

      - name: Type check (TypeScript)
        if: ${{ !cancelled() }}
        run: pnpm exec tsc --noEmit
