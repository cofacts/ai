// Vendored from https://github.com/cofacts/url-resolver
// (src/typeDefs/url_resolver.proto), byte-for-byte except the `ResolveError`
// field type below is qualified as `resolve_error.ResolveError`. The upstream
// repo loads this file dynamically via @grpc/proto-loader, which resolves the
// bare `ResolveError` across the sibling `resolve_error` package leniently;
// standard `protoc` (used here to generate Python stubs) requires the
// cross-package reference to be fully qualified per the protobuf language spec.
syntax = "proto3";

import "resolve_error.proto";

package url_resolver;

service UrlResolver {
  rpc ResolveUrl (UrlsRequest) returns (stream UrlReply) {}
}

message UrlsRequest {
  repeated string urls = 1;
}

message UrlsReply {
  repeated UrlReply reply = 1;
}

message UrlReply {
  string url = 1;
  string canonical = 2;
  string title = 3;
  string summary = 4;
  string top_image_url = 5;
  string html = 6;
  int32 status = 7;
  oneof result {
    resolve_error.ResolveError error = 8;
    bool successfully_resolved = 9;
  }
}
