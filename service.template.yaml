apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cofacts-ai
  labels:
    cloud.googleapis.com/location: asia-east1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/container-dependencies: '{"ingress":["backend"],"backend":["cloudsql-proxy"]}'
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: ${SERVICE_ACCOUNT_EMAIL}
      timeoutSeconds: 900
      containers:
      - name: ingress
        image: ${FRONTEND_IMAGE}
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        ports:
        - containerPort: 3000
        env:
        - name: ADK_URL
          value: "http://localhost:8000"
        - name: COFACTS_API_URL
          value: "${COFACTS_API_URL}"
        - name: LANGFUSE_PUBLIC_KEY
          value: "${LANGFUSE_PUBLIC_KEY}"
        - name: LANGFUSE_SECRET_KEY
          value: "${LANGFUSE_SECRET_KEY}"
        - name: LANGFUSE_BASE_URL
          value: "https://langfuse.cofacts.tw"
      - name: backend
        image: ${BACKEND_IMAGE}
        resources:
          limits:
            cpu: "1000m"
            memory: "2048Mi"
        env:
        - name: PORT
          value: "8000"
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "true"
        - name: GOOGLE_CLOUD_PROJECT
          value: "${GC_PROJECT_ID}"
        - name: GOOGLE_CLOUD_LOCATION
          value: "global"
        - name: LANGFUSE_PUBLIC_KEY
          value: "${LANGFUSE_PUBLIC_KEY}"
        - name: LANGFUSE_SECRET_KEY
          value: "${LANGFUSE_SECRET_KEY}"
        - name: LANGFUSE_BASE_URL
          value: "https://langfuse.cofacts.tw"
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        # Persist artifacts (e.g. Google Search suggestion widgets) to GCS so
        # they survive across revisions/instances, alongside the Postgres
        # session store above.
        - name: GCS_ARTIFACT_BUCKET
          value: "${GCS_ARTIFACT_BUCKET}"
        - name: COFACTS_API_URL
          value: "${COFACTS_API_URL}"
        startupProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
      - name: cloudsql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
        args:
          - "--structured-logs"
          - "--port=5432"
          - "--address=0.0.0.0"
          - "--auto-iam-authn"
          - "${GC_PROJECT_ID}:asia-east1:cofacts"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
        startupProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 2
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
  ${TRAFFIC_BLOCK}
